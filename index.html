<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>점심 룰렛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223b;
    --accent: #ff6b35;
    --accent2: #ffd60a;
    --text: #f0ede8;
    --text2: #a0a0b8;
    --radius: 16px;
    --colors: #ff6b35, #ff9f1c, #ffbf69, #2ec4b6, #3a86ff, #8338ec, #ff006e, #06d6a0, #f72585, #4cc9f0;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nanum Gothic', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(255,107,53,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(58,134,255,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    width: 100%;
    padding: 20px 20px 8px;
    text-align: center;
    position: relative;
    z-index: 10;
  }

  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent) 30%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    -webkit-text-stroke: 0px transparent;
    filter: drop-shadow(0 0 8px rgba(255,107,53,0.4));
  }

  .header p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* Main content */
  .main {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 16px;
    position: relative;
    z-index: 10;
    gap: 16px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* Wheel container */
  .wheel-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }

  /* Pointer */
  .pointer {
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--accent);
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    filter: drop-shadow(0 2px 6px rgba(255,107,53,0.6));
  }

  .pointer::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
  }

  canvas {
    border-radius: 50%;
    display: block;
    box-shadow: 0 0 40px rgba(255,107,53,0.2), 0 0 80px rgba(58,134,255,0.1);
  }

  /* Center button overlay */
  .center-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 79px;
    height: 79px;
    border-radius: 50%;
    background: var(--bg);
    border: 3px solid var(--accent);
    color: var(--accent);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(255,107,53,0.3);
    z-index: 20;
    line-height: 1.2;
    padding: 4px;
    -webkit-tap-highlight-color: transparent;
  }

  .center-btn:active {
    transform: translate(-50%, -50%) scale(0.92);
    box-shadow: 0 0 30px rgba(255,107,53,0.5);
  }

  .center-btn.spinning {
    background: var(--accent);
    color: white;
    animation: pulse-center 0.6s ease-in-out infinite alternate;
  }

  @keyframes pulse-center {
    from { box-shadow: 0 0 15px rgba(255,107,53,0.4); }
    to { box-shadow: 0 0 35px rgba(255,107,53,0.8); }
  }

  /* Result */
  .result-card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1.5px solid rgba(255,107,53,0.3);
    border-radius: var(--radius);
    padding: 14px 20px;
    text-align: center;
    animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
    flex-shrink: 0;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .result-card .label {
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .result-card .name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 26px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-hidden {
    display: none;
  }

  /* Restaurant list section */
  .section {
    width: 100%;
    max-width: 360px;
    flex-shrink: 0;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .count-badge {
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .restaurant-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .restaurant-list::-webkit-scrollbar {
    width: 3px;
  }

  .restaurant-list::-webkit-scrollbar-track {
    background: transparent;
  }

  .restaurant-list::-webkit-scrollbar-thumb {
    background: var(--surface2);
    border-radius: 10px;
  }

  .restaurant-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px 12px;
    animation: fadeIn 0.3s ease;
    transition: border-color 0.2s;
  }

  .restaurant-item:hover {
    border-color: rgba(255,107,53,0.3);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .item-color {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .item-name {
    flex: 1;
    font-size: 14px;
    font-weight: 700;
  }

  .item-delete {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .item-delete:active {
    color: #ff006e;
  }

  /* Add form */
  .add-form {
    width: 100%;
    max-width: 360px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    padding-bottom: 16px;
  }

  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-input:focus {
    border-color: var(--accent);
  }

  .add-input::placeholder {
    color: var(--text2);
  }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), #ff8c42);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    width: 46px;
    height: 46px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .add-btn:active {
    transform: scale(0.92);
    opacity: 0.8;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 20px;
    color: var(--text2);
    font-size: 13px;
  }

  .empty-state span {
    display: block;
    font-size: 32px;
    margin-bottom: 8px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    border-radius: 2px;
  }

  @keyframes confetti-burst {
    0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
    60%  { opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.4); opacity: 0; }
  }

  @keyframes confetti-fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(var(--rot)); opacity: 0; }
  }

  .firework-ring {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    animation: ring-expand 0.6s ease-out forwards;
  }

  @keyframes ring-expand {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.9; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
    <span style="font-size:26px; line-height:1;">🍱</span>
    <h1>점심 룰렛</h1>
  </div>
  <p>오늘 뭐 먹을까? 룰렛에게 맡겨봐!</p>
</div>

<div class="main">
  <!-- Wheel -->
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="300" height="300"></canvas>
    <button class="center-btn" id="spinBtn" onclick="spin()">돌려<br>돌려</button>
  </div>

  <!-- Result -->
  <div class="result-card result-hidden" id="resultCard">
    <div class="label">오늘의 점심</div>
    <div class="name" id="resultName">?</div>
  </div>

  <!-- Restaurant list -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">등록된 식당</span>
      <span class="count-badge" id="countBadge">0개</span>
    </div>
    <div class="restaurant-list" id="restaurantList">
      <div class="empty-state">
        <span>🏪</span>
        식당을 추가해보세요!
      </div>
    </div>
  </div>

  <!-- Add form -->
  <div class="add-form">
    <input class="add-input" id="addInput" type="text" placeholder="식당 이름 입력..." maxlength="15">
    <button class="add-btn" onclick="addRestaurant()">+</button>
  </div>


</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'lunch_restaurants_v2';
const COLORS = [
  '#ff6b35','#ff9f1c','#ffd60a','#2ec4b6',
  '#3a86ff','#8338ec','#ff006e','#06d6a0',
  '#f72585','#4cc9f0','#fb5607','#a7c957'
];

let restaurants = [];
let isSpinning = false;
let currentAngle = 0;
let animFrameId = null;

// ==============================
// ✏️ 식당 목록 여기서 수정하세요!
// ==============================
const RESTAURANT_LIST = [
  "제주둘레국수",
  "정식당(한식뷔페)",
  "선사한우마을(국밥)",
  "용호동낙지",
  "겐로쿠 우동",
  "쌍둥이수육국밥",
  "롤링김밥커피(김치찌게)",
  "스마일칼국수(김밥)",
  "소내장탕.갈비탕",
  "황토불낙보쌈",
  "공주식당",
  "장인닭갈비",
  "이화루(2층중국집)",
  "토종숯불구이",
  "연선생순두부"
];
// ==============================

function load() {
  restaurants = [...RESTAURANT_LIST];
  renderAll();
}

function save() {
  // 목록 변경 시 자동으로 아무것도 안 함 (exportJSON으로 수동 저장)
}

function exportJSON() {
  const json = JSON.stringify(restaurants, null, 2);
  navigator.clipboard.writeText(json)
    .then(() => showToast('✅ 클립보드에 복사됐어요! restaurants.json에 붙여넣으세요'))
    .catch(() => {
      // 클립보드 실패 시 텍스트 영역으로 보여주기
      const ta = document.createElement('textarea');
      ta.value = json;
      ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;height:200px;z-index:9999;font-size:12px;padding:10px;border-radius:8px;border:1px solid #ff6b35;background:#1a1a2e;color:#f0ede8;';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      showToast('✅ 복사됐어요! restaurants.json에 붙여넣으세요');
      setTimeout(() => ta.remove(), 3000);
    });
}

function getColor(i) {
  return COLORS[i % COLORS.length];
}

function drawWheel() {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = cx - 4;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (restaurants.length === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#a0a0b8';
    ctx.font = 'bold 14px Nanum Gothic';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('식당을 추가하세요', cx, cy);
    return;
  }

  const n = restaurants.length;
  const arc = (Math.PI * 2) / n;

  for (let i = 0; i < n; i++) {
    const startAngle = currentAngle + i * arc;
    const endAngle = startAngle + arc;
    const color = getColor(i);

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Border
    ctx.strokeStyle = '#0f0f1a';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.font = 'bold 13px Nanum Gothic';

    const name = restaurants[i];
    const textR = r - 16;
    ctx.fillText(name, textR + 1, 1);
    ctx.fillStyle = 'white';
    ctx.fillText(name, textR, 0);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 36, 0, Math.PI * 2);
  ctx.fillStyle = '#0f0f1a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,107,53,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spin() {
  if (isSpinning) return;
  if (restaurants.length < 2) {
    showToast('식당을 2개 이상 등록해주세요!');
    return;
  }

  isSpinning = true;
  document.getElementById('spinBtn').classList.add('spinning');
  document.getElementById('spinBtn').textContent = '⟳';
  document.getElementById('resultCard').classList.add('result-hidden');

  const totalRotation = (Math.PI * 2) * (8 + Math.random() * 6);
  const duration = 4000 + Math.random() * 1000;
  const startAngle = currentAngle;
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easedProgress = easeOut(progress);

    currentAngle = startAngle + totalRotation * easedProgress;
    drawWheel();

    if (progress < 1) {
      animFrameId = requestAnimationFrame(animate);
    } else {
      finishSpin();
    }
  }

  animFrameId = requestAnimationFrame(animate);
}

function finishSpin() {
  isSpinning = false;
  const btn = document.getElementById('spinBtn');
  btn.classList.remove('spinning');
  btn.innerHTML = '돌려<br>돌려';

  // Find which segment is at top (pointer at -π/2)
  const n = restaurants.length;
  const arc = (Math.PI * 2) / n;
  const normalizedAngle = ((currentAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const pointerAngle = (Math.PI * 2 * 2 - normalizedAngle - Math.PI / 2 + Math.PI * 2) % (Math.PI * 2);
  const winnerIdx = Math.floor(pointerAngle / arc) % n;
  const winner = restaurants[winnerIdx];

  // Show result
  const card = document.getElementById('resultCard');
  const nameEl = document.getElementById('resultName');
  nameEl.textContent = winner;
  card.classList.remove('result-hidden');

  fireConfetti();
  showToast(`🎉 오늘 점심은 "${winner}"!`);
}

function addRestaurant() {
  const input = document.getElementById('addInput');
  const name = input.value.trim();
  if (!name) { showToast('식당 이름을 입력하세요!'); return; }
  if (restaurants.includes(name)) { showToast('이미 등록된 식당이에요!'); return; }
  if (restaurants.length >= 12) { showToast('최대 12개까지 등록 가능해요!'); return; }

  restaurants.push(name);
  save();
  input.value = '';
  renderAll();
  showToast(`"${name}" 추가됨!`);
}

function deleteRestaurant(idx) {
  const name = restaurants[idx];
  restaurants.splice(idx, 1);
  save();
  renderAll();
  document.getElementById('resultCard').classList.add('result-hidden');
  showToast(`"${name}" 삭제됨`);
}

function renderAll() {
  renderList();
  drawWheel();
}

function renderList() {
  const list = document.getElementById('restaurantList');
  const badge = document.getElementById('countBadge');
  badge.textContent = `${restaurants.length}개`;

  if (restaurants.length === 0) {
    list.innerHTML = `<div class="empty-state"><span>🏪</span>식당을 추가해보세요!</div>`;
    return;
  }

  list.innerHTML = restaurants.map((r, i) => `
    <div class="restaurant-item">
      <div class="item-color" style="background:${getColor(i)}"></div>
      <span class="item-name">${r}</span>
      <button class="item-delete" onclick="deleteRestaurant(${i})">×</button>
    </div>
  `).join('');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function fireConfetti() {
  const colors = ['#ff6b35','#ffd60a','#3a86ff','#06d6a0','#ff006e','#8338ec','#4cc9f0','#f72585','#ffbf69','#ffffff'];

  function burst(cx, cy, count, delay) {
    setTimeout(() => {
      // Ring flash
      const ring = document.createElement('div');
      ring.className = 'firework-ring';
      const size = 80 + Math.random() * 80;
      const color = colors[Math.floor(Math.random() * colors.length)];
      ring.style.cssText = `
        left: ${cx}px; top: ${cy}px;
        width: ${size}px; height: ${size}px;
        border: 3px solid ${color};
        animation-duration: 0.5s;
      `;
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 700);

      // Particles
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
        const dist = 80 + Math.random() * 120;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        const w = 5 + Math.random() * 8;
        const h = Math.random() > 0.4 ? w : w * 2.5;
        const col = colors[Math.floor(Math.random() * colors.length)];
        const rot = Math.random() * 1080 - 540;
        p.style.cssText = `
          left: ${cx}px; top: ${cy}px;
          width: ${w}px; height: ${h}px;
          background: ${col};
          --tx: ${tx}px; --ty: ${ty}px; --rot: ${rot}deg;
          animation: confetti-burst ${0.7 + Math.random() * 0.5}s cubic-bezier(0.15,0.5,0.5,1) forwards;
          animation-delay: ${Math.random() * 0.05}s;
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }
    }, delay);
  }

  function fallRain() {
    // Rain from top
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        const w = 6 + Math.random() * 7;
        const h = Math.random() > 0.4 ? w : w * 2.5;
        const col = colors[Math.floor(Math.random() * colors.length)];
        const rot = Math.random() * 1440 - 720;
        p.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -10px;
          width: ${w}px; height: ${h}px;
          background: ${col};
          --rot: ${rot}deg;
          animation: confetti-fall ${2 + Math.random() * 1.5}s ease-in forwards;
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 4000);
      }, i * 40);
    }
  }

  const W = window.innerWidth;
  const H = window.innerHeight;

  // Multiple burst positions
  const positions = [
    [W * 0.5, H * 0.3, 20, 0],
    [W * 0.2, H * 0.25, 16, 200],
    [W * 0.8, H * 0.25, 16, 350],
    [W * 0.3, H * 0.5, 14, 500],
    [W * 0.7, H * 0.5, 14, 600],
    [W * 0.5, H * 0.2, 18, 750],
    [W * 0.15, H * 0.45, 12, 900],
    [W * 0.85, H * 0.45, 12, 1000],
    [W * 0.4, H * 0.3, 14, 1200],
    [W * 0.6, H * 0.3, 14, 1300],
  ];

  positions.forEach(([x, y, n, d]) => burst(x, y, n, d));
  fallRain();
}

// Enter key support
document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addRestaurant();
});

// Init
load();
</script>
